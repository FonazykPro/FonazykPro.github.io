<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FonazykPro.github.io</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            color:white;
            text-align:center;
        }

        .container{
            padding:40px;
            background:rgba(255,255,255,0.1);
            border-radius:20px;
            backdrop-filter:blur(10px);
        }

        h1{
            font-size:4rem;
            margin-bottom:20px;
        }

        p{
            font-size:1.3rem;
            margin-bottom:25px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:white;
            color:#1e3c72;
            text-decoration:none;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            transform:scale(1.05);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FonazykPro.github.io</h1>
        <p>Bienvenue sur mon site internet !</p>
        <a href="#" class="btn">Découvrir</a>
    </div>

</body>
</html>
