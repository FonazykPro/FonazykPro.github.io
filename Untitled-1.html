<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Event</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: url('https://wallpapercave.com/wp/wp5128415.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            text-align: center;
            margin: 0;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.7);
            min-height: 100vh;
            padding: 50px;
        }

        h1 {
            color: #55ff55;
            font-size: 4em;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #55ff55;
            color: black;
            text-decoration: none;
            font-weight: bold;
            border-radius: 10px;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            margin: 20px auto;
            max-width: 700px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

<div class="overlay">

    <h1>⚔️ MINECRAFT EVENT ⚔️</h1>

    <p>Rejoins notre événement Minecraft exceptionnel !</p>

    <a href="#" class="btn">S'inscrire</a>

    <div class="card">
        <h2>📅 Date</h2>
        <p>15 Août 2026 à 18h00</p>
    </div>

    <div class="card">
        <h2>🏆 Activités</h2>
        <p>
            - PvP<br>
            - BedWars<br>
            - Chasse au trésor<br>
            - Concours de construction
        </p>
    </div>

    <div class="card">
        <h2>🌍 Adresse du serveur</h2>
        <p>play.moneventmc.fr</p>
    </div>

</div>

</body>
</html>
